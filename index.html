<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="topbar">

        <div class="right-section">
            <button class="icon-btn menu-btn">☰</button>
            <h2 class="logo">YouTube</h2>
        </div>

        <div class="center-section">
            <input class="search-input" type="text" placeholder="Search">
            <button class="search-btn">🔍</button>
            <button class="icon-btn">🎤</button>
        </div>

        <div class="left-section">
            <button class="icon-btnCRTe">⊕ Create </button>
            <button class="icon-btn">🔔</button>
            <button class="profile-btn">M</button>
        </div>

    </header>

    <div class="page-content">

        <aside class="sidebar">

            <div class="homeandshorts-part">
                <div class="sidebar-item active">
                    <span>🏠</span>
                    <span>خانه</span>
                </div>

                <div class="sidebar-item">
                    <span>🎬</span>
                    <span>Shorts</span>
                </div>
            </div>

            <div class="sidebar-item">
                <span>📺</span>
                <span>اشتراک‌ها</span>
            </div>

            <div class="sidebar-item">
                <span>👤</span>
                <span>You</span>
            </div>

            <div class="sidebar-item">
                <span>🕘</span>
                <span>History</span>
            </div>

        </aside>

        <main class="videos-area">

            <section class="categories">
                <button class="category-btn active-category">همه</button>
                <button class="category-btn">Music</button>
                <button class="category-btn">Gaming</button>
                <button class="category-btn">Game.of.Thrones.S01.720px</button>
                <button class="category-btn">News</button>
                <button class="category-btn">Live</button>
                <button class="category-btn">HTML</button>
                <button class="category-btn">CSS</button>
                <button class="category-btn">Monarch</button>
                <button class="category-btn">JavaScript</button>
                <button class="category-btn">Programming</button>
                
            </section>

            <section class="videos-grid" id="videos-grid"></section>
            <div class="pagination">

                <button id="prev-page">Previous</button>

                <span id="page-number">1</span>

                <button id="next-page">Next</button>

            </div>

        </main>

    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
